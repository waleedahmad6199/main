name: flowiq
description: Intelligent Project Flow Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0

  # State management
  flutter_riverpod: ^2.6.1

  # Graph visualization
  graphview: ^1.2.0

  # Charts
  fl_chart: ^1.2.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2

  # AI-powered UX
  shimmer: ^3.0.0
  animate_do: ^4.2.0

  # Image handling
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"


flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
